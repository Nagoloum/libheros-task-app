<div *ngIf="modal().isOpen" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded-3xl shadow-2xl max-w-md w-full overflow-hidden">
    
    <!-- Header avec couleur selon le type -->
    <div class="px-6 py-5 border-b border-gray-200 flex items-center gap-3"
         [class.bg-red-50]="modal().type === 'error'"
         [class.bg-green-50]="modal().type === 'success'">
      
      <span class="text-2xl" *ngIf="modal().type === 'error'"><lucide-icon name="alert-triangle"></lucide-icon></span>
      <span class="text-2xl" *ngIf="modal().type === 'success'"><lucide-icon name="check-circle"></lucide-icon></span>
      <span class="text-2xl" *ngIf="modal().type === 'confirm'"><lucide-icon name="Trash2"></lucide-icon></span>
      
      <h3 class="text-xl font-semibold" 
          [class.text-red-700]="modal().type === 'error'"
          [class.text-green-700]="modal().type === 'success'">
        {{ modal().title }}
      </h3>
    </div>

    <!-- Message -->
    <div class="p-6 text-gray-700 leading-relaxed text-[15px]">
      {{ modal().message }}
    </div>

    <!-- Boutons -->
    <div class="p-6 border-t border-gray-300 flex gap-3">
      <button 
        *ngIf="modal().type === 'confirm'"
        (click)="closeModal()"
        class="flex-1 py-4 rounded-2xl border border-gray-300 font-medium hover:bg-gray-50">
        {{ modal().cancelText }}
      </button>
      
      <button 
        (click)="confirm()"
        class="flex-1 py-4 font-semibold rounded-2xl transition"
        [class.bg-red-600]="modal().type === 'confirm' || modal().type === 'error'"
        [class.bg-green-600]="modal().type === 'success'"
        [class.text-white]="true">
        {{ modal().confirmText }}
      </button>
    </div>
  </div>
</div>
