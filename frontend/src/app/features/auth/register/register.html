<div class="min-h-screen bg-gray-50 flex items-center justify-center py-12 px-4">
  <div class="max-w-md w-full bg-white rounded-2xl shadow-lg p-8">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-gray-900">Libheros</h1>
      <p class="text-gray-600 mt-2">Créez votre compte</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-6">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Prénom</label>
          <input
            type="text"
            formControlName="firstName"
            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Daniel"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nom</label>
          <input
            type="text"
            formControlName="lastName"
            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Dupont"
          />
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input
          type="email"
          formControlName="email"
          class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Adresse email..."
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
        <div class="relative">
          <input
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="Mot de passe..."
            class="w-full px-5 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg pr-12"
          />

          <button
            type="button"
            (click)="togglePassword()"
            class="absolute right-5 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700"
          >
            <lucide-icon [name]="showPassword ? 'EyeOff' : 'Eye'" size="20"></lucide-icon>
          </button>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1"
          >Confirmer le mot de passe</label
        >
        <div class="relative">
          <input
            [type]="showConfirmPassword ? 'text' : 'password'"
            formControlName="confirmPassword"
            placeholder="Confirmer le mot de passe..."
            class="w-full px-5 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg pr-12"
          />

          <button
            type="button"
            (click)="toggleConfirmPassword()"
            class="absolute right-5 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700"
          >
            <lucide-icon [name]="showConfirmPassword ? 'EyeOff' : 'Eye'" size="20"></lucide-icon>
          </button>
        </div>
      </div>

      <button
        type="submit"
        [disabled]="isLoading || registerForm.invalid"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3.5 rounded-xl transition disabled:opacity-50"
      >
        {{ isLoading ? 'Création du compte...' : 'Créer mon compte' }}
      </button>
    </form>

    <div class="text-center mt-6">
      <p class="text-gray-600">
        Déjà un compte ?
        <a routerLink="/login" class="text-blue-600 hover:underline font-medium">Se connecter</a>
      </p>
    </div>
  </div>
</div>
<app-confirm-modal></app-confirm-modal>
