<div class="min-h-screen bg-gray-50 flex items-center justify-center py-12 px-4">
  <div class="max-w-md w-full bg-white rounded-2xl shadow-lg p-8">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-gray-900">Libheros</h1>
      <p class="text-gray-600 mt-2">Créez votre compte</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-6">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Prénom</label>
          <input 
            type="text" 
            formControlName="firstName"
            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Daniel">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nom</label>
          <input 
            type="text" 
            formControlName="lastName"
            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Dupont">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input 
          type="email" 
          formControlName="email"
          class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="vous@email.com">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
        <input 
          type="password" 
          formControlName="password"
          class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="••••••••">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Confirmer le mot de passe</label>
        <input 
          type="password" 
          formControlName="confirmPassword"
          class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="••••••••">
      </div>

      <button 
        type="submit"
        [disabled]="isLoading || registerForm.invalid"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3.5 rounded-xl transition disabled:opacity-50">
        {{ isLoading ? 'Création du compte...' : 'Créer mon compte' }}
      </button>
    </form>

    <div *ngIf="errorMessage" class="mt-4 text-red-600 text-center text-sm">
      {{ errorMessage }}
    </div>

    <div class="text-center mt-6">
      <p class="text-gray-600">
        Déjà un compte ? 
        <a routerLink="/login" class="text-blue-600 hover:underline font-medium">Se connecter</a>
      </p>
    </div>
  </div>
</div>
