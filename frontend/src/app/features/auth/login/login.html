<div class="min-h-screen bg-linear-to-br from-blue-50 to-gray-100 flex items-center justify-center p-4">
  <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-10">
    <div class="text-center mb-10">
      <h1 class="text-4xl font-bold text-gray-900">Libheros</h1>
      <p class="text-gray-600 mt-3 text-lg">Connectez-vous à votre espace</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
        <input type="email" formControlName="email"
               class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Mot de passe</label>
        <div class="relative">
          <input [type]="showPassword ? 'text' : 'password'" formControlName="password"
                 class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg pr-12">
          <button type="button" (click)="togglePassword()" 
                  class="absolute right-5 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700">
            👁️
          </button>
        </div>
      </div>

      <button type="submit" 
              [disabled]="isLoading || loginForm.invalid"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-2xl text-lg transition disabled:opacity-70">
        {{ isLoading ? 'Connexion...' : 'Se connecter' }}
      </button>
    </form>

    <div *ngIf="errorMessage" class="mt-4 text-red-600 text-center">{{ errorMessage }}</div>

    <div class="text-center mt-8">
      <a routerLink="/register" class="text-blue-600 hover:underline">Pas encore de compte ? Créer un compte</a>
    </div>
  </div>
</div>
